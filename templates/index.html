 <!DOCTYPE html>
<html>
<head>
    <title>Health Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Health Check Form</h2>
    <form action="/analyze" method="post">
        <label>Name:</label>
        <input type="text" name="name" required>

        <label>Age:</label>
        <input type="number" name="age" required>

        <label>Weight (kg):</label>
        <input type="number" step="0.1" name="weight" required>

        <label>Height (cm):</label>
        <input type="number" step="0.1" name="height" required>

        <label>Blood Pressure:</label>
        <input type="number" name="bp" required>

        <label>Sugar Level:</label>
        <input type="number" name="sugar" required>

        <label>Pulse:</label>
        <input type="number" name="pulse" required>

        <button type="submit">Analyze</button>
    </form>
</body>
</html>
